version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: mindscribe_db
    environment:
      POSTGRES_USER: mindscribe
      POSTGRES_PASSWORD: mindscribe_password
      POSTGRES_DB: mindscribe
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindscribe"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindscribe_api
    environment:
      DATABASE_URL: postgresql://mindscribe:mindscribe_password@db:5432/mindscribe
      EMOTION_MODEL_PATH: models/emotion_classifier
      DISTORTION_MODEL_PATH: models/distortion_classifier
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: http://localhost:8501,http://localhost:3000
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./app:/app/app
      - ./src:/app/src
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Streamlit Frontend
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindscribe_streamlit
    environment:
      DATABASE_URL: postgresql://mindscribe:mindscribe_password@db:5432/mindscribe
      EMOTION_MODEL_PATH: models/emotion_classifier
      DISTORTION_MODEL_PATH: models/distortion_classifier
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./app:/app/app
      - ./src:/app/src
    ports:
      - "8501:8501"
    depends_on:
      - db
      - api
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
